spring:
  application:
    name: CadastroFuncionarios
  datasource:
    url: ${DB_URL}
    driver-class-name: org.h2.Driver
    username: ${DB_USER}
    password: ${DB_PASS}

  # Configurando JPA, Hibernate e H2
  jpa:
    show_sql: true
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

  # Configurar o Flyway
  flyway:
    enabled: true
    locations:  classpath:db/migration
    baseline-on-migrate: true